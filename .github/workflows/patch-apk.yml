name: Patch APK Broker Logs

on:
  workflow_dispatch:
    inputs:
      decoded_dir:
        description: "Path to an already decoded APK directory in the repository"
        required: true
        default: "decoded_apks/v400.1456_decoded"
        type: string
      preferFallback:
        description: "Patch TerminalServers first"
        required: true
        default: false
        type: boolean
      sign_apk:
        description: "Sign output APK using repository secrets"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  patch-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install apktool
        shell: bash
        run: |
          set -euo pipefail
          APKTOOL_VERSION="3.0.1"
          APKTOOL_TAG="v${APKTOOL_VERSION}"
          curl -fsSL "https://github.com/iBotPeaches/Apktool/releases/download/${APKTOOL_TAG}/apktool_${APKTOOL_VERSION}.jar" -o /tmp/apktool.jar
          curl -fsSL "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -o /tmp/apktool
          chmod +x /tmp/apktool
          sudo mv /tmp/apktool /usr/local/bin/apktool
          sudo mv /tmp/apktool.jar /usr/local/bin/apktool.jar
          apktool --version

      - name: Install build tools for signing
        if: ${{ inputs.sign_apk }}
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "build-tools;35.0.0"
          echo "APKSIGNER=$ANDROID_HOME/build-tools/35.0.0/apksigner" >> "$GITHUB_ENV"

      - name: Prepare patch target
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          decoded_dir="${{ inputs.decoded_dir }}"
          if [[ ! -d "$decoded_dir" ]]; then
            echo "Decoded directory not found: $decoded_dir"
            exit 1
          fi
          echo "decoded_dir=$decoded_dir" >> "$GITHUB_OUTPUT"

      - name: Apply smali patch
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.preferFallback }}" == "true" ]]; then
            python3 tools/patch_servers_logging.py --root-path "${{ steps.prepare.outputs.decoded_dir }}" --prefer-fallback 2>&1 | tee build/patch.log
          else
            python3 tools/patch_servers_logging.py --root-path "${{ steps.prepare.outputs.decoded_dir }}" 2>&1 | tee build/patch.log
          fi

      - name: Rebuild patched APK
        shell: bash
        run: |
          set -euo pipefail
          apktool b "${{ steps.prepare.outputs.decoded_dir }}" -o build/patched-unsigned.apk

      - name: Sign APK
        if: ${{ inputs.sign_apk }}
        shell: bash
        env:
          APK_KEYSTORE_BASE64: ${{ secrets.APK_KEYSTORE_BASE64 }}
          APK_KEYSTORE_PASSWORD: ${{ secrets.APK_KEYSTORE_PASSWORD }}
          APK_KEY_ALIAS: ${{ secrets.APK_KEY_ALIAS }}
          APK_KEY_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APK_KEYSTORE_BASE64}" || -z "${APK_KEYSTORE_PASSWORD}" || -z "${APK_KEY_ALIAS}" || -z "${APK_KEY_PASSWORD}" ]]; then
            echo "Signing requested but one or more required secrets are missing."
            exit 1
          fi

          echo "$APK_KEYSTORE_BASE64" | base64 --decode > build/signing.keystore

          "$APKSIGNER" sign \
            --ks build/signing.keystore \
            --ks-pass "pass:${APK_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${APK_KEY_ALIAS}" \
            --key-pass "pass:${APK_KEY_PASSWORD}" \
            --out build/patched-signed.apk \
            build/patched-unsigned.apk

      - name: Upload patched artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patched-apk-output
          if-no-files-found: error
          path: |
            build/patched-unsigned.apk
            build/patched-signed.apk
            build/patch.log
