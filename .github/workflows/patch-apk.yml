name: Patch APK Broker Logs

on:
  workflow_dispatch:
    inputs:
      decoded_dir:
        description: "Path to an already decoded APK directory in the repository"
        required: true
        default: "decoded_apks/v400.1456_decoded"
        type: string
      apktool_version:
        description: "Apktool version to install"
        required: true
        default: "2.6.1"
        type: string
      preferFallback:
        description: "Patch TerminalServers first"
        required: true
        default: false
        type: boolean
      terminal_prefixes:
        description: "Optional combo prefixes for serversGet(String), comma-separated (for example: abc,m1,z9)"
        required: false
        default: ""
        type: string
      terminal_max_combos:
        description: "Optional max serversGet(combo) calls before stopping combo loop"
        required: false
        default: ""
        type: string
      terminal_combo_length:
        description: "Optional combo length for serversGet(String) generation (for example: 3,4,5,6)"
        required: false
        default: ""
        type: string
      terminal_charset:
        description: "Optional charset for combo generation (for example: abcdef123)"
        required: false
        default: ""
        type: string
      terminal_delay_seconds:
        description: "Delay between serversGet(combo) calls in seconds"
        required: false
        default: "3"
        type: string

permissions:
  contents: read

jobs:
  patch-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install apktool
        shell: bash
        run: |
          set -euo pipefail
          APKTOOL_VERSION="${{ inputs.apktool_version }}"
          APKTOOL_TAG="v${APKTOOL_VERSION}"
          curl -fsSL "https://github.com/iBotPeaches/Apktool/releases/download/${APKTOOL_TAG}/apktool_${APKTOOL_VERSION}.jar" -o /tmp/apktool.jar
          curl -fsSL "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -o /tmp/apktool
          chmod +x /tmp/apktool
          sudo mv /tmp/apktool /usr/local/bin/apktool
          sudo mv /tmp/apktool.jar /usr/local/bin/apktool.jar
          apktool --version

      - name: Install build tools for signing
        shell: bash
        run: |
          set -euo pipefail
          # sdkmanager closes stdin when done; with pipefail that can surface as a harmless yes SIGPIPE.
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "build-tools;35.0.0"
          echo "APKSIGNER=$ANDROID_HOME/build-tools/35.0.0/apksigner" >> "$GITHUB_ENV"

      - name: Prepare patch target
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          framework_source="tools/apktool/framework/1.apk"
          framework_dir="build/apktool-framework"

          decoded_dir="${{ inputs.decoded_dir }}"
          if [[ ! -d "$decoded_dir" ]]; then
            echo "Decoded directory not found: $decoded_dir"
            exit 1
          fi

          decoded_name="$(basename "$decoded_dir")"
          base_name="${decoded_name%_decoded}"
          # Normalize for safe file/artifact names.
          safe_base_name="$(echo "$base_name" | tr ' /:' '---' | tr -cd '[:alnum:]._-')"
          if [[ -z "$safe_base_name" ]]; then
            safe_base_name="patched_apk"
          fi

          echo "decoded_dir=$decoded_dir" >> "$GITHUB_OUTPUT"
          echo "framework_source=$framework_source" >> "$GITHUB_OUTPUT"
          echo "framework_dir=$framework_dir" >> "$GITHUB_OUTPUT"
          echo "safe_base_name=$safe_base_name" >> "$GITHUB_OUTPUT"
          echo "unsigned_apk=build/${safe_base_name}-patched-unsigned.apk" >> "$GITHUB_OUTPUT"
          echo "signed_apk=build/${safe_base_name}-patched-signed.apk" >> "$GITHUB_OUTPUT"
          echo "patch_log=build/${safe_base_name}-patch.log" >> "$GITHUB_OUTPUT"
          echo "artifact_name=patched-apk-output-${safe_base_name}" >> "$GITHUB_OUTPUT"

      - name: Install Framework
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ steps.prepare.outputs.framework_dir }}"
          apktool if "${{ steps.prepare.outputs.framework_source }}" -p "${{ steps.prepare.outputs.framework_dir }}"

      - name: Apply smali patch
        shell: bash
        run: |
          set -euo pipefail
          # First run the standard patchers
          if [[ "${{ inputs.preferFallback }}" == "true" ]]; then
            python3 tools/patch_servers_logging.py --root-path "${{ steps.prepare.outputs.decoded_dir }}" --prefer-fallback 2>&1 | tee "${{ steps.prepare.outputs.patch_log }}"
          else
            python3 tools/patch_servers_logging.py --root-path "${{ steps.prepare.outputs.decoded_dir }}" 2>&1 | tee "${{ steps.prepare.outputs.patch_log }}"
          fi
          
          # Then run the new RecyclerView/Search/Signature patcher for v400+
          echo "Applying v400+ RecyclerView and Signature patches..." | tee -a "${{ steps.prepare.outputs.patch_log }}"
          python3 tools/patch_servers_rv.py "${{ steps.prepare.outputs.decoded_dir }}" 2>&1 | tee -a "${{ steps.prepare.outputs.patch_log }}"
          
          # Apply HttpURLConnection logging instrumentation
          echo "Applying HttpURLConnection request logging..." | tee -a "${{ steps.prepare.outputs.patch_log }}"
          python3 tools/patch_http_connection_logging.py "${{ steps.prepare.outputs.decoded_dir }}" 2>&1 | tee -a "${{ steps.prepare.outputs.patch_log }}"

      - name: Rebuild patched APK
        shell: bash
        run: |
          set -euo pipefail
          apktool b -p "${{ steps.prepare.outputs.framework_dir }}" "${{ steps.prepare.outputs.decoded_dir }}" -o "${{ steps.prepare.outputs.unsigned_apk }}"

      - name: Sign APK
        if: ${{ inputs.sign_apk }}
        shell: bash
        env:
          APK_KEYSTORE_BASE64: ${{ secrets.APK_KEYSTORE_BASE64 }}
          APK_KEYSTORE_PASSWORD: ${{ secrets.APK_KEYSTORE_PASSWORD }}
          APK_KEY_ALIAS: ${{ secrets.APK_KEY_ALIAS }}
          APK_KEY_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keystore_path="build/signing.keystore"
          key_alias="${APK_KEY_ALIAS:-androiddebugkey}"
          key_password="${APK_KEY_PASSWORD:-android}"
          ks_password="${APK_KEYSTORE_PASSWORD:-android}"

          if [[ -n "${APK_KEYSTORE_BASE64}" && -n "${APK_KEYSTORE_PASSWORD}" && -n "${APK_KEY_ALIAS}" && -n "${APK_KEY_PASSWORD}" ]]; then
            echo "Using repository-provided keystore secrets for signing."
            echo "$APK_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
            key_alias="$APK_KEY_ALIAS"
            key_password="$APK_KEY_PASSWORD"
            ks_password="$APK_KEYSTORE_PASSWORD"
          else
            echo "Keystore secrets not fully set. Generating dummy debug keystore for local/test signing."
            keytool -genkeypair -v \
              -keystore "$keystore_path" \
              -storepass "$ks_password" \
              -alias "$key_alias" \
              -keypass "$key_password" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Debug,C=US"
          fi

          "$APKSIGNER" sign \
            --ks "$keystore_path" \
            --ks-pass "pass:${ks_password}" \
            --ks-key-alias "${key_alias}" \
            --key-pass "pass:${key_password}" \
            --out "${{ steps.prepare.outputs.signed_apk }}" \
            "${{ steps.prepare.outputs.unsigned_apk }}"

      - name: Upload patched artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.artifact_name }}
          if-no-files-found: error
          path: |
            ${{ steps.prepare.outputs.unsigned_apk }}
            ${{ steps.prepare.outputs.signed_apk }}
            ${{ steps.prepare.outputs.patch_log }}
