name: Build Java Tool and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      release_notes:
        description: "Release notes / changelog"
        required: false
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Set Maven project version
        shell: bash
        run: |
          set -euo pipefail
          cd java-tools/
          mvn --batch-mode versions:set -DnewVersion="${{ github.event.inputs.version }}" -DgenerateBackupPoms=false

      - name: Build fat JAR
        shell: bash
        run: |
          set -euo pipefail
          cd java-tools/
          mvn --batch-mode package -DskipTests
          echo "Built artifacts:"
          ls -lh target/*.jar

      - name: Bundle JAR and native libs into zip
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          BUNDLE_DIR="broker-signature-processor-${VERSION}"
          JAR_SRC="java-tools/target/broker-signature-processor-${VERSION}-jar-with-dependencies.jar"
          JAR_DEST="${BUNDLE_DIR}/broker-signature-processor-${VERSION}.jar"
          ZIP_NAME="broker-signature-processor-${VERSION}.zip"

          mkdir -p "${BUNDLE_DIR}/lib/arm64-v8a" "${BUNDLE_DIR}/lib/armeabi-v7a"
          cp "${JAR_SRC}" "${JAR_DEST}"
          cp java-tools/lib/arm64-v8a/*.so  "${BUNDLE_DIR}/lib/arm64-v8a/"
          cp java-tools/lib/armeabi-v7a/*.so "${BUNDLE_DIR}/lib/armeabi-v7a/"
          cp java-tools/run.sh "${BUNDLE_DIR}/"
          cp java-tools/run.bat "${BUNDLE_DIR}/"
          chmod +x "${BUNDLE_DIR}/run.sh"

          zip -r "${ZIP_NAME}" "${BUNDLE_DIR}"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "Bundle contents:"
          unzip -l "${ZIP_NAME}"

      - name: Create GitHub Release and upload bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "Broker Signature Processor v${{ github.event.inputs.version }}"
          body: ${{ github.event.inputs.release_notes }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: ${{ steps.bundle.outputs.zip_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
