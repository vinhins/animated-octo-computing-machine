name: Aggregate Broker Info

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "Path to input JSON file (override BROKER_INPUT_DATA secret, from repo root)"
        required: false
        default: ""
      delay:
        description: "Base delay between API requests (seconds)"
        required: false
        default: "1.0"
      max_requests:
        description: "Max total API calls (0 = unlimited)"
        required: false
        default: "100"
      jitter_percent:
        description: "Random delay jitter ±% (0-100)"
        required: false
        default: "25"
      max_consecutive_errors:
        description: "Stop after N consecutive 403 errors (API blocking detection)"
        required: false
        default: "5"

permissions:
  contents: read

jobs:
  aggregate-brokers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          pip install -q -r broker-info-aggregator/requirements.txt
          echo "[+] Dependencies installed"

      - name: Prepare input file from secret
        shell: bash
        env:
          INPUT_DATA: ${{ secrets.BROKER_INPUT_DATA }}
        run: |
          if [ -z "$INPUT_DATA" ]; then
            echo "[-] BROKER_INPUT_DATA secret is not set"
            exit 1
          fi
          
          # Use workflow input if provided, otherwise write secret data to file
          if [ -n "${{ github.event.inputs.input_file }}" ]; then
            INPUT_FILE="${{ github.event.inputs.input_file }}"
            echo "[*] Using input_file parameter: $INPUT_FILE"
          else
            # Write secret JSON content to temporary file
            INPUT_FILE="/tmp/broker_input.json"
            echo "$INPUT_DATA" > "$INPUT_FILE"
            echo "[*] Created input file from BROKER_INPUT_DATA secret"
          fi
          
          # Verify file exists and is valid JSON
          if [ ! -f "$INPUT_FILE" ]; then
            echo "[-] Input file not found: $INPUT_FILE"
            exit 1
          fi
          
          if ! python -c "import json; json.load(open('$INPUT_FILE'))" 2>/dev/null; then
            echo "[-] Invalid JSON in input file"
            exit 1
          fi
          
          # Export for next steps
          echo "INPUT_FILE=$INPUT_FILE" >> $GITHUB_ENV
          SIZE=$(wc -l < "$INPUT_FILE")
          echo "[+] Input file ready: $INPUT_FILE ($SIZE lines)"

      - name: Run broker aggregator
        shell: bash
        run: |
          DELAY="${{ github.event.inputs.delay }}"
          MAX_REQUESTS="${{ github.event.inputs.max_requests }}"
          JITTER="${{ github.event.inputs.jitter_percent }}"
          MAX_ERRORS="${{ github.event.inputs.max_consecutive_errors }}"
          INPUT="${{ env.INPUT_FILE }}"
          WORK_DIR="broker-info-aggregator"
          
          echo "[*] Starting broker info aggregation..."
          echo "[*] Input: $INPUT"
          echo "[*] Platform: Auto-detected from JSON data (FormattedKeyword field)"
          echo "[*] Base delay: ${DELAY}s | Jitter: ±${JITTER}% | Max requests: $MAX_REQUESTS | Max errors: $MAX_ERRORS"
          echo ""
          
          python "$WORK_DIR/broker_info_aggregator.py" "$INPUT" \
            --delay "$DELAY" \
            --jitter "$JITTER" \
            --max-requests "$MAX_REQUESTS" \
            --max-consecutive-errors "$MAX_ERRORS"
          
          # Move output (JSON + CSV) to work dir for artifact upload
          mv output_brokers_*.json "$WORK_DIR/" 2>/dev/null || true
          mv output_brokers_*.csv "$WORK_DIR/" 2>/dev/null || true

      - name: Verify output
        shell: bash
        run: |
          cd broker-info-aggregator
          
          OUTPUT_FILE=$(ls -t output_*.json 2>/dev/null | head -1)
          
          if [ -z "$OUTPUT_FILE" ]; then
            echo "[-] No output file generated"
            exit 1
          fi
          
          echo "[+] Output file: $OUTPUT_FILE"
          
          SIZE=$(du -h "$OUTPUT_FILE" | cut -f1)
          LINES=$(wc -l < "$OUTPUT_FILE")
          
          echo "[*] File size: $SIZE"
          echo "[*] Line count: $LINES"
          
          # Verify JSON structure
          python -c "
          import json
          data = json.load(open('$OUTPUT_FILE'))
          print(f'[+] Valid JSON structure')
          print(f'[*] Total rows: {len(data.get(\"rows\", []))}')
          print(f'[*] Total API calls: {data.get(\"totalApiCalls\", 0)}')
          print(f'[*] Successful responses: {data.get(\"successfulResponses\", 0)}')
          print(f'[*] Error responses: {data.get(\"errorResponses\", 0)}')
          print(f'[*] Unique brokers: {data.get(\"uniqueBrokers\", 0)}')
          " || exit 1

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: broker-info-aggregation-results
          path: broker-info-aggregator/output_*
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "✓ Aggregation completed"
          echo "  Artifact: broker-info-aggregation-results"
          echo "  Files: broker-info-aggregator/output_*.json"
