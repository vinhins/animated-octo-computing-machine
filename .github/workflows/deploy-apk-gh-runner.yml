name: Deploy Patched APK (Linux ARM ADB Target)

on:
  workflow_dispatch:
    inputs:
      patch_run_id:
        description: "GitHub Actions run ID that produced patched APK artifact"
        required: true
        type: string
      artifact_name:
        description: "Artifact name from patch workflow"
        required: true
        default: "patched-apk-output-v400.1456"
        type: string
      package_name:
        description: "Android package name (optional override)"
        required: false
        default: "net.metaquotes.metatrader4"
        type: string
      launch_activity:
        description: "Launcher activity full class name (optional override)"
        required: false
        default: "net.metaquotes.metatrader4.ui.MainActivity"
        type: string
      adb_endpoint:
        description: "ADB endpoint for ARM device/emulator (host:port)"
        required: true
        default: "127.0.0.1:5555"
        type: string
      adb_connect_timeout_seconds:
        description: "How long to wait for ADB target connection"
        required: false
        default: "180"
        type: string
      logcat_wait_seconds:
        description: "How long to wait while capturing patched-tag logcat output"
        required: false
        default: "300"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  deploy-to-emulator:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download patched APK artifact from patch workflow run
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.patch_run_id }}
          name: ${{ inputs.artifact_name }}
          path: build

      - name: Pick APK from artifact
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          signed_apk="$(ls build/*-patched-signed.apk 2>/dev/null | head -n1 || true)"
          unsigned_apk="$(ls build/*-patched-unsigned.apk 2>/dev/null | head -n1 || true)"

          if [[ -n "$signed_apk" ]]; then
            selected="$signed_apk"
            echo "Using signed APK: $selected"
          elif [[ -n "$unsigned_apk" ]]; then
            selected="$unsigned_apk"
            echo "Signed APK not found. Using unsigned APK: $selected"
          else
            echo "No patched APK found in artifact."
            ls -la build || true
            exit 1
          fi

          echo "apk_path=$selected" >> "$GITHUB_OUTPUT"

      - name: Install ADB tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y adb

      - name: Connect to ARM ADB target
        shell: bash
        run: |
          set -euo pipefail
          serial="${{ inputs.adb_endpoint }}"
          timeout_s="${{ inputs.adb_connect_timeout_seconds }}"
          deadline=$((SECONDS + timeout_s))

          adb start-server
          while (( SECONDS < deadline )); do
            adb connect "$serial" >/dev/null 2>&1 || true
            if [[ "$(adb -s "$serial" get-state 2>/dev/null || true)" == "device" ]]; then
              echo "ADB target connected: $serial"
              exit 0
            fi
            sleep 5
          done

          echo "Failed to connect to ADB target $serial within ${timeout_s}s"
          adb devices -l || true
          exit 1

      - name: Install APK and capture logs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          serial="${{ inputs.adb_endpoint }}"
          apk_path="${{ steps.apk.outputs.apk_path }}"
          pkg="${{ inputs.package_name }}"
          act="${{ inputs.launch_activity }}"
          wait_s="${{ inputs.logcat_wait_seconds }}"
          out_file="build/emulator-logcat-linux-arm.txt"

          adb -s "$serial" install -r "$apk_path"
          adb -s "$serial" logcat -c || true
          adb -s "$serial" shell am start -n "${pkg}/${act}" || true
          adb -s "$serial" shell pidof "$pkg" || true
          timeout "${wait_s}s" adb -s "$serial" logcat -v time -s MT4-BROKER:I MT4-BROKER-FALLBACK:I '*:S' > "$out_file" || true
          adb -s "$serial" logcat -d -v time -s MT4-BROKER:I MT4-BROKER-FALLBACK:I '*:S' >> "$out_file" || true

      - name: Upload deploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-emulator-logs-${{ github.run_id }}-linux-arm
          if-no-files-found: warn
          path: |
            build/emulator-logcat-linux-arm.txt
