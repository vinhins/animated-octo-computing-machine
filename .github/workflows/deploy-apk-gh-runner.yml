name: Deploy Patched APK (Firebase Test Lab)

on:
  workflow_dispatch:
    inputs:
      patch_run_id:
        description: "GitHub Actions run ID that produced patched APK artifact"
        required: true
        type: string
      artifact_name:
        description: "Artifact name from patch workflow"
        required: true
        default: "patched-apk-output-v400.1456"
        type: string
      gcp_project_id:
        description: "Google Cloud project id with Firebase enabled"
        required: true
        type: string
      device_model:
        description: "Firebase Test Lab device model"
        required: false
        default: "redfin"
        type: string
      device_version:
        description: "Android API level for selected device"
        required: false
        default: "30"
        type: string
      locale:
        description: "Device locale"
        required: false
        default: "en"
        type: string
      orientation:
        description: "Device orientation"
        required: false
        default: "portrait"
        type: string
      test_timeout:
        description: "Firebase Test Lab timeout (for example 10m)"
        required: false
        default: "10m"
        type: string
      results_bucket:
        description: "Optional GCS bucket for results (gs://bucket-name)"
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  deploy-to-ftl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download patched APK artifact from patch workflow run
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.patch_run_id }}
          name: ${{ inputs.artifact_name }}
          path: build

      - name: Pick APK from artifact
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          signed_apk="$(ls build/*-patched-signed.apk 2>/dev/null | head -n1 || true)"
          unsigned_apk="$(ls build/*-patched-unsigned.apk 2>/dev/null | head -n1 || true)"

          if [[ -n "$signed_apk" ]]; then
            selected="$signed_apk"
            echo "Using signed APK: $selected"
          elif [[ -n "$unsigned_apk" ]]; then
            selected="$unsigned_apk"
            echo "Signed APK not found. Using unsigned APK: $selected"
          else
            echo "No patched APK found in artifact."
            ls -la build || true
            exit 1
          fi

          echo "apk_path=$selected" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Firebase Test Lab Robo test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          out_file="build/firebase-test-lab-output.txt"
          results_dir="patched-apk-${{ github.run_id }}-${{ github.run_attempt }}"

          args=(
            firebase test android run
            --project "${{ inputs.gcp_project_id }}"
            --type robo
            --app "${{ steps.apk.outputs.apk_path }}"
            --device "model=${{ inputs.device_model }},version=${{ inputs.device_version }},locale=${{ inputs.locale }},orientation=${{ inputs.orientation }}"
            --timeout "${{ inputs.test_timeout }}"
            --results-dir "$results_dir"
          )

          if [[ -n "${{ inputs.results_bucket }}" ]]; then
            args+=(--results-bucket "${{ inputs.results_bucket }}")
          fi

          set +e
          gcloud "${args[@]}" 2>&1 | tee "$out_file"
          status=${PIPESTATUS[0]}
          set -e

          if [[ $status -ne 0 ]]; then
            echo "Firebase Test Lab run failed with exit code $status" | tee -a "$out_file"
            exit $status
          fi

      - name: Upload deploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ftl-logs-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            build/firebase-test-lab-output.txt
