name: Deploy Patched APK (Linux ARM Runner)

on:
  workflow_dispatch:
    inputs:
      patch_run_id:
        description: "GitHub Actions run ID that produced patched APK artifact"
        required: true
        type: string
      artifact_name:
        description: "Artifact name from patch workflow"
        required: true
        default: "patched-apk-output-v400.1456"
        type: string
      package_name:
        description: "Android package name (optional override)"
        required: false
        default: "net.metaquotes.metatrader4"
        type: string
      launch_activity:
        description: "Launcher activity full class name (optional override)"
        required: false
        default: "net.metaquotes.metatrader4.ui.MainActivity"
        type: string
      api_level:
        description: "Android API level for emulator system image"
        required: false
        default: "30"
        type: string
      logcat_wait_seconds:
        description: "How long to wait while capturing patched-tag logcat output"
        required: false
        default: "300"
        type: string
      emulator_boot_timeout:
        description: "Emulator boot timeout in seconds"
        required: false
        default: "900"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  deploy-to-emulator:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download patched APK artifact from patch workflow run
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.patch_run_id }}
          name: ${{ inputs.artifact_name }}
          path: build

      - name: Pick APK from artifact
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          signed_apk="$(ls build/*-patched-signed.apk 2>/dev/null | head -n1 || true)"
          unsigned_apk="$(ls build/*-patched-unsigned.apk 2>/dev/null | head -n1 || true)"

          if [[ -n "$signed_apk" ]]; then
            selected="$signed_apk"
            echo "Using signed APK: $selected"
          elif [[ -n "$unsigned_apk" ]]; then
            selected="$unsigned_apk"
            echo "Signed APK not found. Using unsigned APK: $selected"
          else
            echo "No patched APK found in artifact."
            ls -la build || true
            exit 1
          fi

          echo "apk_path=$selected" >> "$GITHUB_OUTPUT"

      - name: Start emulator and deploy APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api_level }}
          target: google_apis
          arch: arm64-v8a
          profile: pixel_7_pro
          emulator-boot-timeout: ${{ inputs.emulator_boot_timeout }}
          disable-linux-hw-accel: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -accel off
          disable-animations: true
          script: |
            set -euo pipefail
            mkdir -p build
            apk_path="${{ steps.apk.outputs.apk_path }}"
            pkg="${{ inputs.package_name }}"
            act="${{ inputs.launch_activity }}"
            wait_s="${{ inputs.logcat_wait_seconds }}"
            out_file="build/emulator-logcat-linux-arm.txt"

            adb devices
            adb install -r "$apk_path"
            adb logcat -c || true
            adb shell am start -n "${pkg}/${act}" || true
            adb shell pidof "$pkg" || true
            timeout "${wait_s}s" adb logcat -v time -s MT4-BROKER:I MT4-BROKER-FALLBACK:I '*:S' > "$out_file" || true
            adb logcat -d -v time -s MT4-BROKER:I MT4-BROKER-FALLBACK:I '*:S' >> "$out_file" || true

      - name: Upload deploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-emulator-logs-${{ github.run_id }}-linux-arm
          if-no-files-found: warn
          path: |
            build/emulator-logcat-linux-arm.txt
